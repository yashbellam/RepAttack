# Builds signed release APKs and publishes them to a GitHub release whenever a
# v* tag is pushed (e.g. `git tag v1.1 && git push --tags`).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RELEASE_KEYSTORE_BASE64    - base64-encoded contents of repattack-release.jks
#   RELEASE_KEYSTORE_PASSWORD  - keystore password
#   RELEASE_KEY_ALIAS          - `repattack`
#   RELEASE_KEY_PASSWORD       - key password (same as keystore password in our setup)
#
# The release is created as a DRAFT so you can review/edit notes and the
# attached APKs before publishing it to users.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  release:
    name: Build and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release notes can diff from prior tag

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with dependency cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APKs (app + wear)
        run: ./gradlew --no-daemon :app:assembleRelease :wear:assembleRelease

      - name: Stage APKs with versioned names
        id: stage
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk   "dist/RepAttack-${VERSION}.apk"
          cp wear/build/outputs/apk/release/wear-release.apk "dist/RepAttack-Wear-${VERSION}.apk"

      - name: Verify APK signing fingerprints
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Using $BUILD_TOOLS/apksigner"
          "$BUILD_TOOLS/apksigner" verify --print-certs "dist/RepAttack-${{ steps.stage.outputs.version }}.apk"
          "$BUILD_TOOLS/apksigner" verify --print-certs "dist/RepAttack-Wear-${{ steps.stage.outputs.version }}.apk"

      - name: Wipe keystore + properties from workspace
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/release.jks" keystore.properties

      - name: Create draft GitHub release with APKs attached
        uses: softprops/action-gh-release@v2
        with:
          name: Rep Attack ${{ steps.stage.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            dist/RepAttack-${{ steps.stage.outputs.version }}.apk
            dist/RepAttack-Wear-${{ steps.stage.outputs.version }}.apk
